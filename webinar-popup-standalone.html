<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webinar Popup - Standalone Version</title>
    
    <style>
        /* ============================================
           WEBINAR MODAL POPUP - CSS
           Copy this CSS block to your website's stylesheet
           ============================================ */
        
        /* Overlay Background */
        .webinar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 9998;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .webinar-overlay.active {
            display: block;
            opacity: 1;
        }
        
        /* Modal Container */
        .webinar-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            max-width: 600px;
            width: 90%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            display: none;
            opacity: 0;
            transition: all 0.3s ease;
            padding: 24px;
        }
        
        .webinar-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        /* Close Button */
        .webinar-close {
            position: absolute;
            top: -12px;
            right: -12px;
            width: 40px;
            height: 40px;
            background: white;
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #374151;
            transition: all 0.2s ease;
            z-index: 10000;
        }
        
        .webinar-close:hover {
            background: #f3f4f6;
            color: #ef4444;
            transform: scale(1.1);
        }
        
        /* Poster Image */
        .webinar-poster {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: block;
            max-height: 80vh;
            object-fit: contain;
        }
        
        /* Call to Action Buttons */
        .webinar-actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .webinar-btn {
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        
        .webinar-btn-primary {
            background: #10b981;
            color: white;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);
        }
        
        .webinar-btn-primary:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(16, 185, 129, 0.4);
        }
        
        .webinar-btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }
        
        .webinar-btn-secondary:hover {
            background: #e5e7eb;
        }
        
        /* Mobile Responsive */
        @media (max-width: 640px) {
            .webinar-modal {
                width: 95%;
                padding: 16px;
                max-height: 95vh;
                overflow-y: auto;
            }
            
            .webinar-close {
                top: -8px;
                right: -8px;
                width: 36px;
                height: 36px;
            }
            
            .webinar-actions {
                flex-direction: column;
            }
            
            .webinar-btn {
                width: 100%;
            }
        }
        
        /* Prevent body scroll when modal is open */
        body.modal-open {
            overflow: hidden;
        }
        
        /* Animation keyframes */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }
    </style>
</head>
<body>

    <!-- ============================================
         WEBINAR MODAL POPUP - HTML
         Copy this HTML block to your website
         ============================================ -->
    
    <!-- Overlay -->
    <div class="webinar-overlay" id="webinarOverlay" onclick="closeWebinarModal()"></div>
    
    <!-- Modal -->
    <div class="webinar-modal" id="webinarModal">
        <!-- Close Button -->
        <button class="webinar-close" onclick="closeWebinarModal()" aria-label="Close">
            ×
        </button>
        
        <!-- Poster Image -->
        <img 
            src="/webinar.jpg" 
            alt="Webinar Announcement" 
            class="webinar-poster"
        >
        
        <!-- Call to Action Buttons (Optional - Remove if not needed) -->
        <div class="webinar-actions">
            <a 
                href="https://forms.gle/whaTsGAPppdkLxRf8" 
                target="_blank" 
                rel="noopener noreferrer"
                class="webinar-btn webinar-btn-primary"
            >
                Register Now
            </a>
            <button 
                onclick="closeWebinarModal()" 
                class="webinar-btn webinar-btn-secondary"
            >
                Close
            </button>
        </div>
    </div>

    <!-- ============================================
         WEBINAR MODAL POPUP - JAVASCRIPT
         Copy this script block to your website
         ============================================ -->
    
    <script>
        // Configuration
        const MODAL_DELAY = 1500; // Delay in milliseconds (1500 = 1.5 seconds)
        const SESSION_STORAGE_KEY = 'hasSeenWebinarModal';
        
        // Show Modal Function
        function showWebinarModal() {
            const hasSeenModal = sessionStorage.getItem(SESSION_STORAGE_KEY);
            
            // Only show if user hasn't seen it in this session
            if (!hasSeenModal) {
                setTimeout(() => {
                    const overlay = document.getElementById('webinarOverlay');
                    const modal = document.getElementById('webinarModal');
                    
                    if (overlay && modal) {
                        // Add active class to show modal
                        overlay.classList.add('active');
                        modal.classList.add('active');
                        
                        // Prevent body scroll
                        document.body.classList.add('modal-open');
                    }
                }, MODAL_DELAY);
            }
        }
        
        // Close Modal Function
        function closeWebinarModal() {
            const overlay = document.getElementById('webinarOverlay');
            const modal = document.getElementById('webinarModal');
            
            if (overlay && modal) {
                // Remove active class to hide modal
                overlay.classList.remove('active');
                modal.classList.remove('active');
                
                // Allow body scroll
                document.body.classList.remove('modal-open');
                
                // Remember that user has closed the modal
                sessionStorage.setItem(SESSION_STORAGE_KEY, 'true');
            }
        }
        
        // Close modal when ESC key is pressed
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeWebinarModal();
            }
        });
        
        // Initialize modal when page loads
        window.addEventListener('load', showWebinarModal);
        
        // Alternative: Initialize when DOM is ready (faster)
        // document.addEventListener('DOMContentLoaded', showWebinarModal);
    </script>

    <!-- Your website content goes here -->
    <div style="padding: 100px 20px; text-align: center;">
        <h1>Your Website Content</h1>
        <p>The modal will appear 1.5 seconds after page load.</p>
        <br>
        <button onclick="showWebinarModal()" style="padding: 10px 20px; cursor: pointer;">
            Test Modal (Show Again)
        </button>
    </div>

</body>
</html>
